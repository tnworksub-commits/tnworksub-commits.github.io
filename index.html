<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>作業ログ</title>
<style>
  :root {
    --bg: #fbfbfa;
    --fg: #2a2a28;
    --muted: #8a8a84;
    --line: #e8e6e1;
    --card: #ffffff;
    --accent: #6b7a8f;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a19;
      --fg: #e4e3df;
      --muted: #8f8f88;
      --line: #2e2e2b;
      --card: #222220;
      --accent: #9aa8bb;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
                 "Noto Sans JP", "Segoe UI", sans-serif;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 56px 20px 96px;
  }
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px;
    margin-bottom: 40px;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin: 0 0 6px;
  }
  .sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin: 0;
  }
  .entry {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 20px;
  }
  .entry-date {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--accent);
    margin: 0 0 4px;
  }
  .entry-total {
    font-size: 0.8rem;
    color: var(--muted);
    margin: 0 0 14px;
  }
  .entry ul {
    margin: 0;
    padding-left: 1.2em;
  }
  .entry li {
    margin: 3px 0;
    font-size: 0.92rem;
  }
  .entry li b { font-weight: 600; }
  footer {
    margin-top: 48px;
    color: var(--muted);
    font-size: 0.75rem;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>作業ログ</h1>
      <p class="sub">Daily Report</p>
    </header>

    <!-- ▼▼ 新しい日報はこの下（entries の一番上）に追加していきます ▼▼ -->
    <main id="entries">

      <article class="entry">
        <p class="entry-date">2026/07/01（水）</p>
        <p class="entry-total">稼働 2h34m</p>
        <ul>
          <li><b>プロジェクトA</b>：1h01m</li>
          <li><b>プロジェクトB</b>：0h49m</li>
          <li><b>プロジェクトC</b>：0h31m</li>
          <li><b>プロジェクトD</b>：0h12m</li>
        </ul>
      </article>

    </main>
    <!-- ▲▲ ここまで entries ▲▲ -->

    <footer>— log —</footer>
  </div>
</body>
</html>
